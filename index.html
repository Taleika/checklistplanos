<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taleika Films – Checklist Rodaje</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500;700&display=swap" rel="stylesheet">

<style>
/* =======================
   VARIABLES DE TEMA
======================= */
:root{
    --magenta:#c4029d;
    --done:#2ecc71;
}

/* MODO OSCURO – RODAJE */
body[data-theme="dark"]{
    --bg:#0e0e0e;
    --panel:#161616;
    --text:#eaeaea;
    --muted:#888;
}

/* MODO CLARO */
body[data-theme="light"]{
    --bg:#ffffff;
    --panel:#f4f4f4;
    --text:#111;
    --muted:#666;
}

/* =======================
   RESET
======================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Roboto', sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    transition:background .3s ease, color .3s ease;
}

/* =======================
   HEADER
======================= */
header{
    background:#000;
    text-align:center;
    padding:24px 20px 28px;
}

header img{
    width:130px;
    filter:invert(1);
    margin-bottom:12px;
}

header h1{
    font-size:1.2rem;
    font-weight:500;
    letter-spacing:.35rem;
    text-transform:uppercase;
    color:#fff;
}

.separator{
    height:5px;
    background:var(--magenta);
}

/* =======================
   CONTENEDOR
======================= */
.container{
    max-width:680px;
    margin:0 auto;
    padding:30px 20px 120px;
}

.list-selector{
    margin-bottom:16px;
}

.list-selector label{
    display:block;
    font-size:.9rem;
    color:var(--muted);
    margin-bottom:6px;
}

.list-selector select{
    width:100%;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,.2);
    background:var(--panel);
    color:var(--text);
    font-size:.95rem;
}

/* =======================
   CHECKLIST
======================= */
ul{
    list-style:none;
}

li{
    background:var(--panel);
    padding:14px 18px;
    border-radius:12px;
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
    transition:background .25s ease, transform .15s ease;
}

li:hover{
    transform:translateY(-1px);
}

li.done{
    background:rgba(46,204,113,.15);
}

li.done span{
    text-decoration:line-through;
    color:var(--done);
}

.number{
    font-weight:700;
    opacity:.6;
    min-width:28px;
}

.checkbox{
    width:22px;
    height:22px;
    border-radius:6px;
    border:2px solid var(--magenta);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
}

li.done .checkbox{
    background:var(--done);
    border-color:var(--done);
}

.checkbox::after{
    content:"✔";
    color:#fff;
    font-size:14px;
    display:none;
}

li.done .checkbox::after{
    display:block;
}

/* =======================
   CONTROLES
======================= */
.controls{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:var(--panel);
    padding:14px;
    display:flex;
    gap:10px;
    justify-content:center;
    border-top:1px solid rgba(255,255,255,.08);
}

button{
    border:none;
    padding:12px 18px;
    border-radius:40px;
    font-weight:600;
    cursor:pointer;
    font-size:.9rem;
}

button.add{
    background:var(--magenta);
    color:#fff;
}

button.reset{
    background:#333;
    color:#fff;
}

button.theme{
    background:#555;
    color:#fff;
}
</style>
</head>

<body data-theme="dark">

<header>
    <img src="images/LOGO TK.svg" alt="Taleika Films">
    <h1>Checklist de Rodaje</h1>
</header>

<div class="separator"></div>

<div class="container">
    <div class="list-selector">
        <label for="listSelect">Lista</label>
        <select id="listSelect"></select>
    </div>
    <ul id="list"></ul>
</div>

<div class="controls">
    <button class="add" onclick="addItem()">➕ Agregar plano</button>
    <button class="reset" onclick="resetList()">Reset</button>
    <button class="theme" onclick="toggleTheme()">🌗 Modo</button>
</div>

<script>
/* =======================
   DATA
======================= */
const listPresets = {
"actual": {
title: "Checklist actual",
items: [
"PM Seguimiento desde atrás",
"PP Seguimiento desde atrás mira de reojo",
"PP Seguimiento manos a contraluz mientras camina",
"PG Seguimiento desde adelante mirando hacia un costado",
"PM Seguimiento desde adelante",
"PP Seguimiento desde adelante mirando al frente y a un lateral",
"PP Pies en pasto caminata lateral",
"PM Caminata piso pies desde cintura para abajo en diagonal",
"PG a PP Apoyada en un árbol traveling in",
"PP a PG Apoyada en un árbol traveling out",
"PP sentada en el piso cámara girando",
"PG Falso drone seguimiento desde arriba",
"PM Acostada en el piso plano cenital",
"PM Acostada en el piso cámara al ras con codos apoyados",
"PP Acostada en el piso cámara al ras con codos apoyados",
"PM Cámara gira alrededor contrapicada",
"PP Posando para foto cámara gira",
"PP desde arriba levanta la mirada y mira a cámara",
"PG pasa caminando lateralmente",
"PG travelling circular ella girando con la cámara",
"PM Apoyada en una pared plano lateral",
"PM Apoyada en una pared frontal",
"PP Apoyada en la pared",
"PPP Mitad de cara ojo y boca",
"PPP Lateral desde atrás perfil",
"PM Mano corre la cámara hacia un costado"
]
},
"sinteplast-planos": {
title: "Sinteplast PLANOS",
items: [
"PP: Echando cemento y arena en balde",
"PM: lo mismo, cemento y arena.",
"PP y PM: Agua cayendo en el balde",
"PM a contraluz en cámara lenta entra el batidor y hace un desastre",
"PM y PP con cinta de peligro cruzando la calle.",
"PP: sacando cemento con cuchara",
"PP sacando arena con cuchara",
"PM detalla Kit con el bache delante, fijo y en movimiento.",
"PP de cada parte del producto, bolsa",
"PP: Se pasa el cepillo en el bache",
"PM: Pasando el cepillo otra angulación",
"PP Sacando pedacitos de hormigón",
"PP: Entra el Spray de costado al plano. Echa un poco al aire",
"PM: Vemos rociar la superficie",
"PP: Vemos rociar desde otro ángulo.",
"PP: Abre el paquete del componente A",
"PM: Se echa de a poco el polvo",
"PP: Se echa el polvo",
"PM: Se alisa con palita y con llana.",
"PP: se aplica el spray otra vez arriba",
"PM: se aplica el spray",
"PM: Se emprolija",
"PM: Plano corte de calle, planos de fábrica y ruedas pasando.",
"PM: un pie pasa caminando por arriba",
"PM: Un martillo golpea una torre de ladrillos.",
"PP: Una maza golpea",
"PM: Una rueda de un auto pasa por arriba.",
"PG a PM: ZOOM in al bache",
"PM: Kit plano producto.",
"PM: Mano agarrando el spray movimiento como cargando un arma, apoyándolo fuerte sobre la palma de la otra mano",
"PP: Rociando de distintos ángulos.",
"PP: Se abre la bolsa",
"PM: Polvo en el bache",
"PM: Aplanando.",
"PM: Spray sobre finalizado",
"PM: pruebas rueda de auto."
]
}
};

const list = document.getElementById("list");
const listSelect = document.getElementById("listSelect");
const savedSelectedList = localStorage.getItem("selectedList");
const defaultListId = savedSelectedList && listPresets[savedSelectedList] ? savedSelectedList : "actual";
let selectedListId = defaultListId;
let items = loadItems(selectedListId);

Object.entries(listPresets).forEach(([id,preset])=>{
    const option = document.createElement("option");
    option.value = id;
    option.textContent = preset.title;
    listSelect.appendChild(option);
});
listSelect.value = selectedListId;
listSelect.onchange = ()=>{
    selectedListId = listSelect.value;
    localStorage.setItem("selectedList", selectedListId);
    items = loadItems(selectedListId);
    render();
};

function getChecklistStorageKey(listId){
    return `checklist_${listId}`;
}

function loadItems(listId){
    const storageKey = getChecklistStorageKey(listId);
    const savedItems = JSON.parse(localStorage.getItem(storageKey));
    if(savedItems) return savedItems;

    if(listId === "actual"){
        const legacyItems = JSON.parse(localStorage.getItem("checklist"));
        if(legacyItems){
            localStorage.setItem(storageKey, JSON.stringify(legacyItems));
            return legacyItems;
        }
    }

    return listPresets[listId].items.map(text => ({text, done:false}));
}

/* =======================
   RENDER
======================= */
function render(){
    list.innerHTML = "";
    items.forEach((item,i)=>{
        const li = document.createElement("li");
        if(item.done) li.classList.add("done");
        li.innerHTML = `
            <span class="number">${i+1}.</span>
            <div class="checkbox"></div>
            <span>${item.text}</span>
        `;
        li.onclick = ()=>{
            item.done = !item.done;
            save();
        };
        list.appendChild(li);
    });
}

/* =======================
   STORAGE
======================= */
function save(){
    localStorage.setItem(getChecklistStorageKey(selectedListId), JSON.stringify(items));
    render();
}

function resetList(){
    if(confirm("¿Resetear checklist?")){
        items.forEach(i=>i.done=false);
        save();
    }
}

function addItem(){
    const text = prompt("Nuevo plano:");
    if(text){
        items.push({text, done:false});
        save();
    }
}

/* =======================
   THEME
======================= */
const body = document.body;
const savedTheme = localStorage.getItem("theme") || "dark";
body.dataset.theme = savedTheme;

function toggleTheme(){
    body.dataset.theme = body.dataset.theme === "dark" ? "light" : "dark";
    localStorage.setItem("theme", body.dataset.theme);
}

/* INIT */
render();
</script>

</body>
</html>
