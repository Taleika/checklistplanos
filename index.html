<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist – Planos Entrada</title>

<style>
:root{
    --magenta:#c0187a;
    --black:#0b0b0b;
    --green:#1b7f3a;
    --bg:#ffffff;
    --gray:#eaeaea;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background:var(--bg);
    color:#222;
}

/* HEADER */
.header{
    background:var(--black);
    color:#fff;
    padding:24px 20px 28px;
    text-align:center;
}

.header img{
    width:90px;
    margin-bottom:12px;
}

.header h1{
    margin:0;
    font-size:1.4rem;
    letter-spacing:.08em;
    text-transform:uppercase;
}

/* SEPARADOR */
.separator{
    height:4px;
    background:var(--magenta);
}

/* CONTENEDOR */
.app{
    max-width:720px;
    margin:30px auto;
    padding:0 20px 30px;
}

/* BOTÓN RESET */
.reset-btn{
    display:block;
    margin:0 auto 26px;
    padding:10px 26px;
    border-radius:30px;
    border:1px solid var(--gray);
    background:#fff;
    font-weight:600;
    cursor:pointer;
    transition:all .25s ease;
}

.reset-btn:hover{
    background:#f5f5f5;
    transform:translateY(-1px);
}

/* LISTA */
ul{
    list-style:none;
    padding:0;
    margin:0;
}

/* ITEM */
li{
    display:flex;
    align-items:flex-start;
    gap:14px;
    padding:14px 10px;
    border-bottom:1px solid var(--gray);
    color:var(--magenta);
    transition:all .25s ease;
}

li:last-child{
    border-bottom:none;
}

/* CHECK */
input[type="checkbox"]{
    transform:scale(1.3);
    margin-top:4px;
    cursor:pointer;
}

/* TEXTO */
label{
    cursor:pointer;
    line-height:1.45;
    font-size:.95rem;
}

/* COMPLETADO */
li.done{
    color:var(--green);
    background:#f3fbf6;
}

li.done label{
    text-decoration:line-through;
    opacity:.85;
}

/* FOOTER */
.footer{
    margin-top:26px;
    font-size:.85rem;
    text-align:center;
    opacity:.5;
}
</style>
</head>

<body>

<header class="header">
    <img src="LOGO TK.svg" alt="Taleika Films">
    <h1>Planos · Entrada</h1>
</header>

<div class="separator"></div>

<div class="app">

    <button class="reset-btn" id="resetBtn">Reset checklist</button>

    <ul id="checklist">
        <li><input type="checkbox"><label>PM Seguimiento desde atrás</label></li>
        <li><input type="checkbox"><label>PP Seguimiento desde atrás mira de reojo</label></li>
        <li><input type="checkbox"><label>PP Seguimiento manos a contraluz mientras camina</label></li>
        <li><input type="checkbox"><label>PG Seguimiento desde adelante mirando hacia un costado</label></li>
        <li><input type="checkbox"><label>PM Seguimiento desde adelante</label></li>
        <li><input type="checkbox"><label>PP Seguimiento desde adelante mirando al frente y a un lateral</label></li>
        <li><input type="checkbox"><label>PP Pies en pasto caminata lateral</label></li>
        <li><input type="checkbox"><label>PM Caminata piso pies desde cintura para abajo en diagonal</label></li>
        <li><input type="checkbox"><label>PG a PP Apoyada en un árbol traveling in</label></li>
        <li><input type="checkbox"><label>PP a PG Apoyada en un árbol traveling out</label></li>
        <li><input type="checkbox"><label>PP sentada en el piso cámara girando</label></li>
        <li><input type="checkbox"><label>PG Falso drone seguimiento desde arriba</label></li>
        <li><input type="checkbox"><label>PM Acostada en el piso plano cenital</label></li>
        <li><input type="checkbox"><label>PM Acostada en el piso cámara al ras de ella con los codos en el piso</label></li>
        <li><input type="checkbox"><label>PP Acostada en el piso cámara al ras de ella con los codos en el piso</label></li>
        <li><input type="checkbox"><label>PM Cámara gira alrededor contrapicada</label></li>
        <li><input type="checkbox"><label>PP Posando para foto, cámara gira</label></li>
        <li><input type="checkbox"><label>PP desde arriba levanta la mirada y mira a cámara</label></li>
        <li><input type="checkbox"><label>PG pasa caminando lateralmente</label></li>
        <li><input type="checkbox"><label>PG travelling circular ella girando con la cámara</label></li>
        <li><input type="checkbox"><label>PM Apoyada en una pared, plano lateral al ras de la pared ella mira</label></li>
        <li><input type="checkbox"><label>PM Apoyada en una pared, frontal</label></li>
        <li><input type="checkbox"><label>PP Apoyada en la pared</label></li>
        <li><input type="checkbox"><label>PPP Cortado mitad de cara, ojo y boca</label></li>
        <li><input type="checkbox"><label>PPP Lateral desde atrás perfil</label></li>
        <li><input type="checkbox"><label>PM la chica con la mano corre la cámara hacia un costado</label></li>
    </ul>

    <div class="footer">
        Checklist de rodaje · Taleika Films
    </div>

</div>

<script>
const checklistItems = document.querySelectorAll('#checklist li');
const resetBtn = document.getElementById('resetBtn');
const STORAGE_KEY = 'checklist-planos-entrada';

function loadState(){
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    checklistItems.forEach((item, index)=>{
        item.querySelector('input').checked = saved[index] || false;
    });
    updateUI();
}

function saveState(){
    const state = [];
    checklistItems.forEach(item=>{
        state.push(item.querySelector('input').checked);
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function updateUI(){
    checklistItems.forEach(item=>{
        item.classList.toggle(
            'done',
            item.querySelector('input').checked
        );
    });
}

checklistItems.forEach(item=>{
    item.querySelector('input').addEventListener('change',()=>{
        saveState();
        updateUI();
    });
});

resetBtn.addEventListener('click',()=>{
    if(!confirm('¿Resetear checklist?')) return;
    checklistItems.forEach(item=>{
        item.querySelector('input').checked = false;
        item.classList.remove('done');
    });
    localStorage.removeItem(STORAGE_KEY);
});

loadState();
</script>

</body>
</html>
