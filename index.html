<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist – Planos Entrada</title>

<link rel="manifest" href="manifest.json">

<style>
:root{
    --magenta:#c0187a;
    --black:#0b0b0b;
    --green:#1b7f3a;
    --bg:#ffffff;
    --text:#222;
    --gray:#eaeaea;
}

body.dark{
    --bg:#0b0b0b;
    --text:#eaeaea;
    --gray:#1f1f1f;
}

*{box-sizing:border-box;}

body{
    margin:0;
    font-family:system-ui, sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:.3s;
}

/* HEADER */
.header{
    background:var(--black);
    color:#fff;
    padding:20px;
    text-align:center;
    position:relative;
}

.header img{
    width:90px;
    margin-bottom:10px;
}

.header h1{
    margin:0;
    font-size:1.3rem;
    letter-spacing:.1em;
    text-transform:uppercase;
}

/* BOTÓN MODO */
.mode-btn{
    position:absolute;
    top:18px;
    right:18px;
    background:none;
    border:1px solid #444;
    color:#fff;
    padding:6px 12px;
    border-radius:20px;
    font-size:.75rem;
    cursor:pointer;
}

/* SEPARADOR */
.separator{
    height:4px;
    background:var(--magenta);
}

/* APP */
.app{
    max-width:720px;
    margin:30px auto;
    padding:0 20px 30px;
}

/* BOTONES */
button{
    cursor:pointer;
}

.reset-btn,
.add-btn{
    display:block;
    margin:0 auto 18px;
    padding:10px 26px;
    border-radius:30px;
    border:1px solid var(--gray);
    background:var(--bg);
    color:var(--text);
    font-weight:600;
    transition:.25s;
}

.reset-btn:hover,
.add-btn:hover{
    transform:translateY(-1px);
}

/* LISTA */
ul{
    list-style:none;
    padding:0;
    margin:0;
}

li{
    display:flex;
    gap:14px;
    padding:14px 10px;
    border-bottom:1px solid var(--gray);
    color:var(--magenta);
}

li.done{
    color:var(--green);
    background:rgba(0,128,0,.08);
}

input[type="checkbox"]{
    transform:scale(1.3);
    margin-top:4px;
}

label{
    flex:1;
    cursor:pointer;
    line-height:1.4;
}

li.done label{
    text-decoration:line-through;
}

/* FOOTER */
.footer{
    text-align:center;
    font-size:.8rem;
    opacity:.5;
    margin-top:20px;
}
</style>
</head>

<body>

<header class="header">
    <img src="images/LOGO%20TK.svg" alt="Taleika Films">
    <h1>Planos · Entrada</h1>
    <button class="mode-btn" id="modeBtn">RODAJE</button>
</header>

<div class="separator"></div>

<div class="app">

<button class="reset-btn" id="resetBtn">Reset checklist</button>

<ul id="checklist"></ul>

<button class="add-btn" id="addBtn">+ Agregar plano</button>

<div class="footer">
Checklist de rodaje · Taleika Films
</div>

</div>

<script>
const checklistEl = document.getElementById('checklist');
const resetBtn = document.getElementById('resetBtn');
const addBtn = document.getElementById('addBtn');
const modeBtn = document.getElementById('modeBtn');

const STORAGE_KEY = 'taleika-checklist';
const MODE_KEY = 'taleika-mode';

const baseItems = [
"PM Seguimiento desde atrás",
"PP Seguimiento desde atrás mira de reojo",
"PP Seguimiento manos a contraluz mientras camina",
"PG Seguimiento desde adelante mirando hacia un costado",
"PM Seguimiento desde adelante"
];

let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || baseItems.map(t=>({text:t,done:false}));

function render(){
    checklistEl.innerHTML='';
    data.forEach((item,i)=>{
        const li=document.createElement('li');
        if(item.done) li.classList.add('done');

        li.innerHTML=`
            <input type="checkbox" ${item.done?'checked':''}>
            <label contenteditable="true">${item.text}</label>
        `;

        li.querySelector('input').onchange=e=>{
            item.done=e.target.checked;
            save();
            render();
        };

        li.querySelector('label').onblur=e=>{
            item.text=e.target.innerText;
            save();
        };

        checklistEl.appendChild(li);
    });
}

function save(){
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

resetBtn.onclick=()=>{
    if(confirm('¿Resetear checklist?')){
        data.forEach(i=>i.done=false);
        save();
        render();
    }
};

addBtn.onclick=()=>{
    data.push({text:'Nuevo plano',done:false});
    save();
    render();
};

modeBtn.onclick=()=>{
    document.body.classList.toggle('dark');
    localStorage.setItem(MODE_KEY,document.body.classList.contains('dark'));
};

if(localStorage.getItem(MODE_KEY)==='true'){
    document.body.classList.add('dark');
}

render();

/* PWA */
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
