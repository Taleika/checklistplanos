<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taleika Films – Checklist Rodaje</title>

<link rel="manifest" href="manifest.json">

<style>
:root{
    --bg:#0e0e0e;
    --panel:#161616;
    --text:#eaeaea;
    --muted:#888;
    --magenta:#c4029d;
    --done:#2ecc71;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:20px;
}

/* HEADER */
header{
    text-align:center;
    padding:30px 20px;
    background:#000;
}

header img{
    width:140px;
    margin-bottom:15px;
    filter:invert(1); /* LOGO BLANCO */
}

header h1{
    font-size:1.4rem;
    font-weight:500;
    letter-spacing:.25rem;
    text-transform:uppercase;
}

.separator{
    height:4px;
    background:var(--magenta);
    margin-bottom:30px;
}

/* CONTENEDOR */
.app{
    max-width:720px;
    margin:0 auto;
    background:var(--panel);
    border-radius:18px;
    padding:25px 20px;
}

/* LISTA */
ul{
    list-style:none;
}

li{
    display:flex;
    align-items:flex-start;
    gap:14px;
    padding:14px 10px;
    border-bottom:1px solid #222;
    transition:background .3s ease;
}

li.done{
    background:rgba(46,204,113,.08);
}

li.done span{
    color:var(--done);
    text-decoration:line-through;
}

.number{
    color:var(--muted);
    min-width:26px;
}

input[type="checkbox"]{
    transform:scale(1.2);
    margin-top:4px;
}

span{
    line-height:1.4;
}

/* BOTONES */
.controls{
    display:flex;
    gap:12px;
    margin-top:25px;
    flex-wrap:wrap;
}

button{
    flex:1;
    padding:14px;
    border:none;
    border-radius:40px;
    font-size:.95rem;
    cursor:pointer;
}

.reset{
    background:#333;
    color:#fff;
}

.add{
    background:var(--magenta);
    color:#fff;
}

/* INPUT NUEVO */
.new-item{
    margin-top:15px;
    display:none;
}

.new-item input{
    width:100%;
    padding:12px 16px;
    border-radius:30px;
    border:none;
    outline:none;
}
</style>
</head>

<body>

<header>
    <img src="images/LOGO TK.svg" alt="Taleika Films">
    <h1>Checklist de Rodaje</h1>
</header>

<div class="separator"></div>

<div class="app">
    <ul id="list"></ul>

    <div class="new-item" id="newItem">
        <input type="text" id="newText" placeholder="Nuevo plano...">
    </div>

    <div class="controls">
        <button class="add" onclick="toggleNew()">➕ Agregar plano</button>
        <button class="reset" onclick="resetList()">Reset</button>
    </div>
</div>

<script>
const initialItems = [
"PM Seguimiento desde atrás",
"PP Seguimiento desde atrás mira de reojo",
"PP Seguimiento manos a contraluz mientras camina",
"PG Seguimiento desde adelante mirando hacia un costado",
"PM Seguimiento desde adelante",
"PP Seguimiento desde adelante mirando al frente y a un lateral",
"PP Pies en pasto caminata lateral",
"PM Caminata piso pies desde cintura para abajo en diagonal",
"PG a PP Apoyada en un árbol traveling in",
"PP a PG Apoyada en un árbol traveling out",
"PP sentada en el piso cámara girando",
"PG Falso drone seguimiento desde arriba",
"PM Acostada en el piso plano cenital",
"PM Acostada en el piso cámara al ras de ella con los codos en el piso",
"PP Acostada en el piso cámara al ras de ella con los codos en el piso",
"PM Cámara gira alrededor contrapicada",
"PP Posando para foto, cámara gira",
"PP desde arriba levanta la mirada y mira a cámara",
"PG pasa caminando lateralmente",
"PG travelling circular ella girando con la cámara",
"PM Apoyada en una pared, plano lateral al ras de la pared ella mira",
"PM Apoyada en una pared, frontal",
"PP Apoyada en la pared",
"PPP Cortado mitad de cara, ojo y boca (simil Marti)",
"PPP Lateral desde atrás perfil",
"PM la chica con la mano corre la cámara hacia un costado"
];

let items = JSON.parse(localStorage.getItem("checklist")) || initialItems.map(text => ({ text, done:false }));

const list = document.getElementById("list");

function render(){
    list.innerHTML="";
    items.forEach((item,i)=>{
        const li=document.createElement("li");
        if(item.done) li.classList.add("done");

        li.innerHTML=`
            <span class="number">${i+1}.</span>
            <input type="checkbox" ${item.done?"checked":""}>
            <span>${item.text}</span>
        `;

        li.querySelector("input").addEventListener("change",e=>{
            item.done=e.target.checked;
            save();
            render();
        });

        list.appendChild(li);
    });
}

function save(){
    localStorage.setItem("checklist",JSON.stringify(items));
}

function resetList(){
    if(!confirm("¿Resetear checklist?")) return;
    items=initialItems.map(text=>({text,done:false}));
    save();
    render();
}

function toggleNew(){
    const box=document.getElementById("newItem");
    box.style.display=box.style.display==="block"?"none":"block";
    document.getElementById("newText").focus();
}

document.getElementById("newText").addEventListener("keydown",e=>{
    if(e.key==="Enter" && e.target.value.trim()){
        items.push({text:e.target.value.trim(),done:false});
        e.target.value="";
        save();
        render();
    }
});

render();
</script>

</body>
</html>
